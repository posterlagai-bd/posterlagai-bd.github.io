  .pin-btn:hover{background:#cc0000!important;color:#fff!important;transform:scale(1.05)}
  .pin-btn:active{transform:scale(.95)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useCallback,useRef}=React;

const STATUS_FLOW=["Talking","Confirmed","Printing","Delivered"];
const STATUS_COLOR={
  Talking:  {bg:"#2a1a1a",text:"#ff4444",border:"#550000"},
  Confirmed:{bg:"#1a1a2a",text:"#4488ff",border:"#003388"},
  Printing: {bg:"#2a1f0a",text:"#ffaa00",border:"#664400"},
  Delivered:{bg:"#0a2a0a",text:"#44cc44",border:"#005500"},
};
const PAYMENT_METHODS=["COD","Bkash","Nagad","Cash"];
const USERS=[{id:"owner1",label:"Owner",pin:"1234"},{id:"owner2",label:"Partner",pin:"5678"}];

const todayStr=()=>new Date().toISOString().split("T")[0];
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().split("T")[0];};
const fmtDate=(d)=>{if(!d)return"—";const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;};
const tk=(n)=>`BDT ${Number(n||0).toFixed(2)}`;
let _id=Date.now();
const uid=()=>(++_id).toString(36);
const newProduct=()=>({id:uid(),name:"",qty:"",unitPrice:"",cost:"",manualTotal:""});
const productTotal=(p)=>p.manualTotal!==""?parseFloat(p.manualTotal)||0:(parseFloat(p.qty)||0)*(parseFloat(p.unitPrice)||0);
const orderRevenue=(products=[])=>products.reduce((s,p)=>s+productTotal(p),0);
const orderCost=(products=[])=>products.reduce((s,p)=>s+(parseFloat(p.cost)||0)*(parseFloat(p.qty)||1),0);
const hasCost=(products=[])=>products.some(p=>parseFloat(p.cost)>0);
const orderProfit=(products=[],deliveryCharge=0,deliveryPaid=false)=>{
  const rev=orderRevenue(products);
  const cost=hasCost(products)?orderCost(products):0;
  const dc=deliveryPaid?0:(parseFloat(deliveryCharge)||0);
  return hasCost(products)?rev-cost-dc:rev-dc;
};
let nextSeq=1;
const makeOrder=()=>({
  id:uid(),seq:nextSeq++,clientName:"",phone:"",address:"",
  orderDate:todayStr(),deliveryDate:"",printDate:"",printDaysBefore:"",
  status:"Talking",products:[newProduct()],notes:"",
  deliveryCharge:"",deliveryPaid:false,paymentMethod:"COD",
  history:[`${todayStr()}: Order created`],expanded:false,  invoiceNum:`PL${String(nextSeq-1).padStart(5,"0")}`,
});

// ── FIREBASE HELPERS ──────────────────────────────────────────────────────────
const getFS=()=>window.__firestore;

const saveOrderToFS=async(order)=>{
  const fs=getFS();
  const {expanded,...toSave}=order;
  await fs.setDoc(fs.doc("orders",order.id),toSave);
};

const deleteOrderFromFS=async(id)=>{
  const fs=getFS();
  await fs.deleteDoc(fs.doc("orders",id));
};

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function RetroLoginScreen({onLogin}){
  const[pin,setPin]=useState("");
  const[err,setErr]=useState("");
  const[shake,setShake]=useState(false);
  const attempt=useCallback(()=>{
    const found=USERS.find(u=>u.pin===pin);
    if(found){onLogin(found);}
    else{setShake(true);setErr("WRONG PIN. TRY AGAIN.");setPin("");setTimeout(()=>setShake(false),600);}
  },[pin,onLogin]);
  useEffect(()=>{
    const h=(e)=>{
      if(e.key>="0"&&e.key<="9")setPin(p=>p.length<4?p+e.key:p);
      else if(e.key==="Backspace")setPin(p=>p.slice(0,-1));
      else if(e.key==="Enter")attempt();
    };
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[attempt]);
  return(
    <div style={{minHeight:"100vh",background:"#0a0a0a",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Courier New',monospace",padding:20}}>
      <div style={{position:"fixed",inset:0,pointerEvents:"none",background:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px)",zIndex:9999}}/>
      <div className="flicker" style={{width:"100%",maxWidth:420}}>
        <div style={{border:"2px solid #cc0000",borderRadius:4,background:"#0d0d0d",boxShadow:"0 0 40px rgba(204,0,0,0.4),inset 0 0 40px rgba(0,0,0,0.8)",overflow:"hidden"}}>
          <div style={{background:"#cc0000",padding:"6px 14px",display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:12,height:12,borderRadius:"50%",background:"#ff6666"}}/>
            <div style={{width:12,height:12,borderRadius:"50%",background:"#ffaa00"}}/>
            <div style={{width:12,height:12,borderRadius:"50%",background:"#44cc44"}}/>
            <span style={{marginLeft:8,fontSize:11,color:"#fff",fontWeight:"bold",letterSpacing:2}}>POSTER_LAGAI_TERMINAL v1.0</span>
          </div>
          <div style={{padding:"32px 28px 28px"}}>
            <pre style={{color:"#cc0000",fontSize:9,lineHeight:1.3,textAlign:"center",marginBottom:24,fontFamily:"monospace"}}>{`
██████╗  ██████╗ ███████╗████████╗███████╗██████╗ 
██╔══██╗██╔═══██╗██╔════╝╚══██╔══╝██╔════╝██╔══██╗
██████╔╝██║   ██║███████╗   ██║   █████╗  ██████╔╝
██╔═══╝ ██║   ██║╚════██║   ██║   ██╔══╝  ██╔══██╗
██║     ╚██████╔╝███████║   ██║   ███████╗██║  ██║
╚═╝      ╚═════╝ ╚══════╝   ╚═╝   ╚══════╝╚═╝  ╚═╝
██╗      █████╗  ██████╗  █████╗ ██╗                
██║     ██╔══██╗██╔════╝ ██╔══██╗██║                
██║     ███████║██║  ███╗███████║██║                
██║     ██╔══██║██║   ██║██╔══██║██║                
███████╗██║  ██║╚██████╔╝██║  ██║██║                
╚══════╝╚═╝  ╚═╝ ╚═════╝ ╚═╝  ╚═╝╚═╝`}</pre>
            <div className="glow-text" style={{color:"#cc0000",fontSize:22,fontWeight:"bold",textAlign:"center",marginBottom:6,letterSpacing:2}}>HEY CHIEF!</div>
            <div style={{color:"#ff6666",fontSize:15,textAlign:"center",marginBottom:28,letterSpacing:1}}>LOGIN PLEASE<span className="blink">_</span></div>
            <div style={{color:"#44cc44",fontSize:12,marginBottom:8,letterSpacing:1}}>&gt; ENTER ACCESS CODE:</div>
            <div style={{display:"flex",justifyContent:"center",gap:14,marginBottom:20}}>
              {[0,1,2,3].map(i=><div key={i} style={{width:18,height:18,borderRadius:"50%",border:"2px solid #cc0000",background:pin.length>i?"#cc0000":"transparent",boxShadow:pin.length>i?"0 0 10px #cc0000":"none",transition:"all 0.15s"}}/>)}
            </div>
            <div style={{animation:shake?"shake 0.5s ease":"none"}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
                {[1,2,3,4,5,6,7,8,9].map(n=>(
                  <button key={n} className="pin-btn" onClick={()=>setPin(p=>p.length<4?p+n:p)}
                    style={{background:"#1a1a1a",color:"#cc0000",border:"1px solid #330000",borderRadius:4,padding:"14px 0",fontSize:18,fontWeight:"bold",cursor:"pointer",transition:"all 0.1s"}}>{n}</button>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <button className="pin-btn" onClick={()=>setPin(p=>p.slice(0,-1))} style={{background:"#1a1a1a",color:"#ff6666",border:"1px solid #330000",borderRadius:4,padding:"14px 0",fontSize:14,fontWeight:"bold",cursor:"pointer",transition:"all 0.1s"}}>⌫</button>
                <button className="pin-btn" onClick={()=>setPin(p=>p.length<4?p+"0":p)} style={{background:"#1a1a1a",color:"#cc0000",border:"1px solid #330000",borderRadius:4,padding:"14px 0",fontSize:18,fontWeight:"bold",cursor:"pointer",transition:"all 0.1s"}}>0</button>
                <button className="pin-btn" onClick={attempt} style={{background:"#1a0000",color:"#ff4444",border:"1px solid #cc0000",borderRadius:4,padding:"14px 0",fontSize:14,fontWeight:"bold",cursor:"pointer",transition:"all 0.1s"}}>↵</button>
              </div>
            </div>
            {err&&<div style={{color:"#ff4444",fontSize:12,textAlign:"center",marginTop:14,letterSpacing:2}}>⚠ {err}</div>}
            <div style={{marginTop:24,borderTop:"1px solid #1a1a1a",paddingTop:14,color:"#333",fontSize:11,textAlign:"center",letterSpacing:1}}>AUTHORIZED PERSONNEL ONLY · POSTER LAGAI SYSTEMS</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const[orders,setOrders]=useState([]);
  const[loaded,setLoaded]=useState(false);
  const[fbReady,setFbReady]=useState(!!window.__firebaseReady);
  const[view,setView]=useState("orders");
  const[filterStatus,setFilterStatus]=useState("All");
  const[search,setSearch]=useState("");
  const[showForm,setShowForm]=useState(false);
  const[draft,setDraft]=useState(null);
  const[pnlFrom,setPnlFrom]=useState(todayStr().slice(0,7)+"-01");
  const[pnlTo,setPnlTo]=useState(todayStr());
  const[user,setUser]=useState(null);
  const[printOrder,setPrintOrder]=useState(null);
  const[confirmDelete,setConfirmDelete]=useState(null);

  // Wait for Firebase to be ready
  useEffect(()=>{
    if(window.__firebaseReady){setFbReady(true);return;}
    const h=()=>setFbReady(true);
    window.addEventListener("firebaseReady",h);
    return()=>window.removeEventListener("firebaseReady",h);
  },[]);

  // Subscribe to Firestore in real time
  useEffect(()=>{
    if(!fbReady)return;
    const fs=getFS();
    const unsub=fs.onSnapshot(fs.collection("orders"),(snapshot)=>{
      const docs=snapshot.docs.map(d=>({expanded:false,...d.data()}));
      docs.sort((a,b)=>(a.seq||0)-(b.seq||0));
      const maxSeq=docs.reduce((m,o)=>Math.max(m,o.seq||0),0);
      nextSeq=maxSeq+1;
      setOrders(docs);
      setLoaded(true);
    },(err)=>{
      console.error("Firestore error:",err);
      setLoaded(true);
    });
    return()=>unsub();
  },[fbReady]);

  const updateOrder=async(id,patch)=>{
    setOrders(prev=>prev.map(o=>{
      if(o.id!==id)return o;
      const skip=new Set(["history","expanded","products","seq","id"]);
      const note=Object.entries(patch).filter(([k])=>!skip.has(k)).map(([k,v])=>`${k}:"${o[k]}"→"${v}"`).join(", ");
      const updated={...o,...patch,history:note?[...o.history,`${todayStr()}: ${note}`]:o.history};
      saveOrderToFS(updated);
      return updated;
    }));
  };

  const advanceStatus=(id)=>{
    const o=orders.find(x=>x.id===id);
    const idx=STATUS_FLOW.indexOf(o.status);
    if(idx<STATUS_FLOW.length-1)updateOrder(id,{status:STATUS_FLOW[idx+1]});
  };

  const deleteOrder=async(id)=>{
    setOrders(prev=>prev.filter(o=>o.id!==id));
    await deleteOrderFromFS(id);
  };

  const saveOrder=async()=>{
    if(!draft.clientName.trim())return alert("Client name is required.");
    const days=parseInt(draft.printDaysBefore);
    const pd=draft.deliveryDate&&!isNaN(days)?addDays(draft.deliveryDate,-days):draft.printDate||"";
    const saved={...draft,printDate:pd};
    await saveOrderToFS(saved);
    setDraft(null);setShowForm(false);
  };

  const pnlData=useMemo(()=>{
    const mo=orders.filter(o=>{
      if(o.status!=="Delivered")return false;
      const d=o.deliveryDate||o.orderDate;
      return d>=pnlFrom&&d<=pnlTo;
    });
    const revenue=mo.reduce((s,o)=>s+orderRevenue(o.products),0);
    const delivery=mo.reduce((s,o)=>s+(parseFloat(o.deliveryCharge)||0),0);
    const totalCost=mo.reduce((s,o)=>s+orderCost(o.products),0);
    return{orders:mo,revenue,delivery,total:revenue+delivery,totalCost,profit:revenue-totalCost};
  },[orders,pnlFrom,pnlTo]);

  const visible=orders.filter(o=>{
    const ms=filterStatus==="All"||o.status===filterStatus;
    const mq=!search||o.clientName.toLowerCase().includes(search.toLowerCase())||o.products.some(p=>p.name.toLowerCase().includes(search.toLowerCase()));
    return ms&&mq;
  }).slice().sort((a,b)=>{
    if(filterStatus==="Delivered"){
      const ai=parseInt((a.invoiceNum||"").replace(/\D/g,""))||0;
      const bi=parseInt((b.invoiceNum||"").replace(/\D/g,""))||0;
      return bi-ai;
    }
    return (b.seq||0)-(a.seq||0);
  });

  const printDueToday=orders.filter(o=>o.printDate===todayStr()&&o.status==="Confirmed");

  if(!fbReady||!loaded)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0d0d0d",color:"#fff",gap:16}}>
      <div style={{width:40,height:40,border:"3px solid #cc0000",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <div style={{color:"#cc0000",fontFamily:"'Courier New',monospace",letterSpacing:2,fontSize:13}}>CONNECTING TO FIREBASE...</div>
    </div>
  );

  if(!user)return<RetroLoginScreen onLogin={setUser}/>;
  if(printOrder)return<InvoicePrint order={printOrder} onClose={()=>setPrintOrder(null)} onSave={async(u)=>{await updateOrder(u.id,u);setPrintOrder({...printOrder,...u});}}/>;

  return(
    <div style={{fontFamily:"Georgia,serif",background:"#0d0d0d",minHeight:"100vh",color:"#eee"}}>
      <div style={{background:"#111",borderBottom:"2px solid #cc0000",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontSize:20,fontWeight:"bold",color:"#fff",letterSpacing:1}}>Poster Lagai</div>
          <div style={{fontSize:11,color:"#666",marginTop:1}}>Order Management System</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#44cc44",boxShadow:"0 0 6px #44cc44"}}/>
          <span style={{fontSize:11,color:"#44cc44"}}>Firebase Live</span>
          <NavBtn label="📦 Orders" active={view==="orders"} onClick={()=>setView("orders")}/>
          <NavBtn label="📊 P&L"    active={view==="pnl"}    onClick={()=>setView("pnl")}/>
          <span style={{fontSize:12,background:"#1a1a1a",border:"1px solid #cc0000",padding:"4px 10px",borderRadius:20,color:"#cc0000"}}>{user.label} ✓</span>
          <button onClick={()=>setUser(null)} style={bS("#1a1a1a","#aaa",11,"#444")}>Lock</button>
        </div>
      </div>

      {printDueToday.length>0&&(
        <div style={{background:"#cc0000",color:"#fff",padding:"8px 20px",fontWeight:"bold",fontSize:13}}>
          🖨️ PRINT TODAY: {printDueToday.map(o=>o.clientName).join(" · ")}
        </div>
      )}

      <div style={{padding:"18px 14px",maxWidth:980,margin:"0 auto"}}>
        {view==="orders"&&(
          <>
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
              <input placeholder="Search client or product…" value={search} onChange={e=>setSearch(e.target.value)} style={iS({flex:1,minWidth:150})}/>
              <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={iS({width:130})}>
                <option>All</option>{STATUS_FLOW.map(s=><option key={s}>{s}</option>)}
              </select>
              <button onClick={()=>{setDraft(makeOrder());setShowForm(true);}} style={bS("#cc0000","#fff")}>+ New Order</button>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
              {STATUS_FLOW.map(s=>(
                <div key={s} style={{background:STATUS_COLOR[s].bg,border:`1px solid ${STATUS_COLOR[s].border}`,color:STATUS_COLOR[s].text,borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:"bold"}}>
                  {s}: {orders.filter(o=>o.status===s).length}
                </div>
              ))}
            </div>
            {visible.length===0&&<div style={{textAlign:"center",color:"#444",marginTop:60,fontSize:15}}>No orders yet. Add one above!</div>}
            {visible.map(o=>(
              <OrderCard key={o.id} order={o} onUpdate={updateOrder} onAdvance={advanceStatus}
                onEdit={()=>{setDraft({...o,products:o.products.map(p=>({...p}))});setShowForm(true);}}
                onPrint={()=>setPrintOrder(o)} onDeleteRequest={id=>setConfirmDelete(id)}/>
            ))}
          </>
        )}
        {view==="pnl"&&<PnlView data={pnlData} from={pnlFrom} to={pnlTo} onFromChange={setPnlFrom} onToChange={setPnlTo} onPrintOrder={setPrintOrder}/>}
      </div>

      {showForm&&draft&&(
        <Modal onClose={()=>{setShowForm(false);setDraft(null);}}>
          <OrderForm draft={draft} setDraft={setDraft} onSave={saveOrder} onCancel={()=>{setShowForm(false);setDraft(null);}}/>
        </Modal>
      )}

      {confirmDelete&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:3000}}>
          <div style={{background:"#1a1a1a",border:"1px solid #cc0000",borderRadius:14,padding:28,width:300,textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:10}}>🗑️</div>
            <div style={{fontWeight:"bold",fontSize:16,marginBottom:8,color:"#fff"}}>Delete this order?</div>
            <div style={{color:"#888",fontSize:13,marginBottom:20}}>This cannot be undone.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmDelete(null)} style={{...bS("#222","#aaa",13,"#444"),flex:1,padding:"10px 0"}}>Cancel</button>
              <button onClick={()=>{deleteOrder(confirmDelete);setConfirmDelete(null);}} style={{...bS("#cc0000","#fff"),flex:1,padding:"10px 0"}}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ORDER CARD ────────────────────────────────────────────────────────────────
function OrderCard({order:o,onUpdate,onAdvance,onEdit,onPrint,onDeleteRequest}){
  const sc=STATUS_COLOR[o.status];
  const isLate=o.deliveryDate&&o.deliveryDate<todayStr()&&o.status!=="Delivered";
  const printSoon=o.printDate&&o.printDate<=addDays(todayStr(),1)&&o.status==="Confirmed";
  const rev=orderRevenue(o.products),dc=parseFloat(o.deliveryCharge)||0;
  const grandTotal=o.deliveryPaid?rev:rev+dc;
  return(
    <div style={{background:"#111",border:`1px solid ${isLate?"#cc0000":"#222"}`,borderRadius:10,marginBottom:10,overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",cursor:"pointer",flexWrap:"wrap"}} onClick={()=>onUpdate(o.id,{expanded:!o.expanded})}>
        <div style={{flex:1,minWidth:160}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontWeight:"bold",fontSize:15,color:"#fff"}}>#{o.seq} — {o.clientName||"Unnamed"}</span>
            {o.phone&&<span style={{color:"#555",fontSize:12}}>📞 {o.phone}</span>}
            {isLate&&<span style={{color:"#cc0000",fontSize:11,fontWeight:"bold"}}>⚠ LATE</span>}
            {printSoon&&<span style={{color:"#ffaa00",fontSize:11,fontWeight:"bold"}}>🖨 PRINT SOON</span>}
          </div>
          <div style={{fontSize:12,color:"#555",marginTop:3}}>{o.products.filter(p=>p.name).map(p=>`${p.name}${p.qty?` ×${p.qty}`:""}`).join(", ")||"No products"}</div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{background:sc.bg,color:sc.text,border:`1px solid ${sc.border}`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:"bold"}}>{o.status}</span>
          <span style={{background:"#1a1a1a",border:"1px solid #333",color:"#aaa",borderRadius:20,padding:"3px 10px",fontSize:11}}>{o.paymentMethod||"COD"}</span>
          {dc>0&&<span style={{background:o.deliveryPaid?"#0a2a0a":"#2a0a0a",color:o.deliveryPaid?"#44cc44":"#cc4444",border:`1px solid ${o.deliveryPaid?"#005500":"#550000"}`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:"bold"}}>🚚 {tk(dc)} {o.deliveryPaid?"Paid":"Unpaid"}</span>}
          <span style={{color:"#fff",fontSize:13,fontWeight:"bold"}}>Total: {tk(grandTotal)}</span>
          {o.deliveryDate&&<span style={{color:"#555",fontSize:12}}>Del: {fmtDate(o.deliveryDate)}</span>}
        </div>
      </div>
      {o.expanded&&(
        <div style={{borderTop:"1px solid #1e1e1e",padding:"12px 14px",background:"#0d0d0d"}}>
          <div style={{display:"flex",gap:20,flexWrap:"wrap",marginBottom:12,fontSize:13,color:"#888"}}>
            <Info label="Order Date" value={fmtDate(o.orderDate)}/>
            {o.printDate&&<Info label="Print Date" value={fmtDate(o.printDate)}/>}
            {o.address&&<Info label="Address" value={o.address}/>}
            {o.invoiceNum&&<Info label="Invoice #" value={o.invoiceNum}/>}
            {(()=>{const cost=orderCost(o.products),profit=orderProfit(o.products,o.deliveryCharge,o.deliveryPaid);return cost>0||true?<Info label="Profit" value={tk(profit)}/>:null;})()}
          </div>
          {dc>0&&(
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,padding:"8px 12px",borderRadius:8,background:"#1a1a1a",border:`1px solid ${o.deliveryPaid?"#005500":"#550000"}`}}>
              <span style={{color:"#aaa",fontSize:13}}>🚚 Delivery: <strong style={{color:"#fff"}}>{tk(dc)}</strong></span>
              <span style={{marginLeft:"auto",fontWeight:"bold",color:o.deliveryPaid?"#44cc44":"#cc4444"}}>{o.deliveryPaid?"✅ Paid":"❌ Unpaid"}</span>
              <button onClick={()=>onUpdate(o.id,{deliveryPaid:!o.deliveryPaid})} style={bS(o.deliveryPaid?"#550000":"#005500","#fff",11)}>Mark {o.deliveryPaid?"Unpaid":"Paid"}</button>
            </div>
          )}
          <div style={{overflowX:"auto",marginBottom:12}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#cc0000",color:"#fff"}}>{["Item","Qty","Rate","Amount"].map(h=><th key={h} style={{padding:"7px 12px",textAlign:h==="Item"?"left":"right"}}>{h}</th>)}</tr></thead>
              <tbody>{o.products.map((p,i)=>(
                <tr key={p.id} style={{background:i%2===0?"#111":"#161616",borderBottom:"1px solid #1e1e1e"}}>
                  <td style={{padding:"7px 12px",color:"#fff",fontWeight:"bold"}}>{p.name||"—"}</td>
                  <td style={{padding:"7px 12px",color:"#aaa",textAlign:"right"}}>{p.qty||"—"}</td>
                  <td style={{padding:"7px 12px",color:"#aaa",textAlign:"right"}}>{p.unitPrice?tk(parseFloat(p.unitPrice)):"—"}</td>
                  <td style={{padding:"7px 12px",color:"#fff",textAlign:"right",fontWeight:"bold"}}>{tk(productTotal(p))}</td>
                </tr>
              ))}</tbody>
              <tfoot>
                {dc>0&&!o.deliveryPaid&&<tr style={{background:"#1a1a1a"}}><td colSpan={3} style={{padding:"7px 12px",color:"#888",fontStyle:"italic"}}>Delivery Fees</td><td style={{padding:"7px 12px",color:"#aaa",textAlign:"right"}}>{tk(dc)}</td></tr>}
                <tr style={{background:"#cc0000"}}><td colSpan={3} style={{padding:"7px 12px",color:"#fff",fontWeight:"bold"}}>Total</td><td style={{padding:"7px 12px",color:"#fff",textAlign:"right",fontWeight:"bold"}}>{tk(grandTotal)}</td></tr>
              </tfoot>
            </table>
          </div>
          {o.notes&&<div style={{fontSize:13,color:"#888",marginBottom:10,background:"#1a1a00",padding:"7px 10px",borderRadius:6,border:"1px solid #333300"}}>📝 {o.notes}</div>}
          {o.history&&o.history.length>0&&<div style={{fontSize:12,color:"#444",marginBottom:12}}>{o.history.map((h,i)=><div key={i}>· {h}</div>)}</div>}
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={onPrint} style={bS("#1a1a1a","#fff",12,"#cc0000")}>🖨️ Invoice</button>
            <button onClick={onEdit} style={bS("#1a1a1a","#fff",12,"#333")}>✏️ Edit</button>
            {o.status!=="Delivered"&&<button onClick={()=>onAdvance(o.id)} style={bS("#003300","#44cc44",12,"#005500")}>→ {STATUS_FLOW[STATUS_FLOW.indexOf(o.status)+1]}</button>}
            <button onClick={()=>onDeleteRequest(o.id)} style={bS("#1a0000","#cc4444",12,"#550000")}>🗑 Delete</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── LOGO DROP ZONE ────────────────────────────────────────────────────────────
function LogoDropZone({logo,setLogo}){
  const[drag,setDrag]=useState(false);
  const load=(file)=>{if(!file||!file.type.startsWith("image/"))return;const r=new FileReader();r.onload=e=>setLogo(e.target.result);r.readAsDataURL(file);};
  return(
    <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
      onDrop={e=>{e.preventDefault();setDrag(false);load(e.dataTransfer.files[0]);}}
      style={{border:`2px dashed ${drag?"#cc0000":"#333"}`,borderRadius:10,padding:logo?"6px":"14px 10px",textAlign:"center",cursor:"pointer",background:drag?"#1a0000":"#111",transition:"all 0.2s",minWidth:90,position:"relative"}}
      onClick={()=>{const i=document.createElement("input");i.type="file";i.accept="image/*";i.onchange=e=>load(e.target.files[0]);i.click();}}>
      {logo
        ?<><img src={logo} alt="Logo" style={{maxWidth:160,maxHeight:90,objectFit:"contain",display:"block"}}/>
           <button onClick={e=>{e.stopPropagation();setLogo(null);}} style={{position:"absolute",top:2,right:4,background:"none",border:"none",color:"#cc0000",cursor:"pointer",fontSize:16}}>✕</button></>
        :<div style={{color:"#444",fontSize:11}}>🖼 Drop logo<br/>or click</div>}
    </div>
  );
}

// ── INVOICE ───────────────────────────────────────────────────────────────────
function InvoicePrint({order:o,onClose,onSave}){
  const[logo,setLogo]=useState(null);
  const[orderImages,setOrderImages]=useState([]);
  const[edits,setEdits]=useState({
    invoiceNum:o.invoiceNum||`PL${String(o.seq).padStart(3,"0")}`,
    clientName:o.clientName,phone:o.phone||"",address:o.address||"",
    orderDate:o.orderDate,paymentMethod:o.paymentMethod||"COD",notes:o.notes||"",
    deliveryCharge:o.deliveryCharge||"",deliveryPaid:o.deliveryPaid||false,
    products:o.products.map(p=>({...p})),
  });
  const set=(k,v)=>setEdits(e=>({...e,[k]:v}));
  const setP=(pid,f,v)=>setEdits(e=>({...e,products:e.products.map(p=>p.id===pid?{...p,[f]:v}:p)}));
  const addP=()=>setEdits(e=>({...e,products:[...e.products,newProduct()]}));
  const remP=(pid)=>setEdits(e=>({...e,products:e.products.filter(p=>p.id!==pid)}));
  const rev=orderRevenue(edits.products),dc=parseFloat(edits.deliveryCharge)||0;
  const grandTotal=edits.deliveryPaid?rev:rev+dc;
  const handleSave=()=>onSave({id:o.id,...edits});

  const addImages=(files)=>{
    Array.from(files).forEach(file=>{
      if(!file.type.startsWith("image/"))return;
      const r=new FileReader();
      r.onload=e=>setOrderImages(prev=>[...prev,{id:uid(),src:e.target.result,name:file.name}]);
      r.readAsDataURL(file);
    });
  };
  const removeImage=(id)=>setOrderImages(prev=>prev.filter(img=>img.id!==id));
  const doPrint=()=>{
    const html=buildInvoiceHTML(edits,rev,dc,grandTotal,logo,orderImages);
    const win=window.open("","_blank","width=800,height=900");
    if(!win){alert("Pop-up blocked! Please allow pop-ups for this page and try again.");return;}
    win.document.open();
    win.document.write(html);
    win.document.close();
    win.focus();
    // Give images a moment to load before triggering print
    win.onload=()=>{win.print();};
    // Fallback: if onload already fired (e.g. no images), print after short delay
    setTimeout(()=>{try{if(win&&!win.closed)win.print();}catch(e){}},800);
  };

  return(
    <div style={{fontFamily:"Georgia,serif",background:"#0d0d0d",minHeight:"100vh",color:"#eee"}}>
      <div style={{background:"#111",borderBottom:"2px solid #cc0000",padding:"12px 20px",display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
        <button onClick={onClose} style={bS("#1a1a1a","#aaa",12,"#333")}>← Back</button>
        <span style={{fontWeight:"bold",fontSize:15,flex:1,color:"#fff"}}>Invoice Editor — #{edits.invoiceNum}</span>
        <button onClick={handleSave} style={bS("#1a3300","#44cc44",12,"#005500")}>💾 Save Changes</button>
        <button onClick={doPrint} style={bS("#cc0000","#fff",13)}>🖨️ Print / Save as PDF</button>
      </div>
      <div style={{maxWidth:760,margin:"24px auto",padding:"0 14px"}}>
        <div style={{background:"#111",border:"1px solid #222",borderRadius:12,overflow:"hidden"}}>
          <div style={{padding:"28px 32px 20px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:16,borderBottom:"2px solid #cc0000"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                <LogoDropZone logo={logo} setLogo={setLogo}/>
                <div>
                  <div style={{fontSize:18,fontWeight:"bold",color:"#fff"}}>Poster Lagai</div>
                  <div style={{fontSize:12,color:"#555"}}>Print &amp; Design</div>
                </div>
              </div>
              <div style={{fontSize:13,color:"#666",marginBottom:4}}>Bill To:</div>
              <InlineEdit value={edits.clientName} onChange={v=>set("clientName",v)} style={{fontSize:15,fontWeight:"bold",color:"#fff"}} placeholder="Client Name"/>
              <InlineEdit value={edits.phone} onChange={v=>set("phone",v)} style={{fontSize:13,color:"#888",display:"block",marginTop:3}} placeholder="Phone number"/>
              <InlineEdit value={edits.address} onChange={v=>set("address",v)} style={{fontSize:12,color:"#666",display:"block",marginTop:2}} placeholder="Address"/>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:32,fontWeight:"bold",color:"#fff",letterSpacing:3,marginBottom:4}}>INVOICE</div>
              <div style={{color:"#cc0000",fontSize:14,marginBottom:14}}># <InlineEdit value={edits.invoiceNum} onChange={v=>set("invoiceNum",v)} style={{color:"#cc0000",fontSize:14,fontWeight:"bold"}} placeholder="INV-001"/></div>
              <Row label="Date:" value={<input type="date" value={edits.orderDate} onChange={e=>set("orderDate",e.target.value)} style={{...iS({width:140}),background:"transparent",border:"1px solid #333",color:"#ccc",fontSize:13}}/>}/>
              <Row label="Payment:" value={<select value={edits.paymentMethod} onChange={e=>set("paymentMethod",e.target.value)} style={{background:"#1a1a1a",border:"1px solid #333",color:"#ccc",borderRadius:4,padding:"4px 8px",fontSize:13}}>{PAYMENT_METHODS.map(m=><option key={m}>{m}</option>)}</select>}/>
              <div style={{marginTop:12,background:"#cc0000",borderRadius:6,padding:"8px 14px",display:"flex",justifyContent:"space-between",gap:24,minWidth:220}}>
                <span style={{color:"#fff",fontWeight:"bold",fontSize:13}}>Balance Due</span>
                <span style={{color:"#fff",fontWeight:"bold",fontSize:13}}>{tk(grandTotal)}</span>
              </div>
            </div>
          </div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr style={{background:"#1a1a1a"}}>{["Item","Qty","Rate","Amount"].map((h,i)=><th key={h} style={{padding:"10px 16px",textAlign:i===0?"left":"right",color:"#aaa",letterSpacing:1}}>{h}</th>)}<th style={{width:30}}></th></tr></thead>
            <tbody>
              {edits.products.map((p,i)=>{
                const total=productTotal(p),manualMode=p.manualTotal!=="";
                return(
                  <tr key={p.id} style={{borderBottom:"1px solid #1a1a1a",background:i%2===0?"#111":"#0d0d0d"}}>
                    <td style={{padding:"10px 20px"}}><InlineEdit value={p.name} onChange={v=>setP(p.id,"name",v)} style={{color:"#fff",fontWeight:"bold",fontSize:14}} placeholder="Product name"/></td>
                    <td style={{padding:"10px 16px",textAlign:"right"}}><InlineEdit value={p.qty} onChange={v=>setP(p.id,"qty",v)} style={{color:"#ccc",textAlign:"right"}} placeholder="0" type="number"/></td>
                    <td style={{padding:"10px 16px",textAlign:"right"}}><InlineEdit value={p.unitPrice} onChange={v=>setP(p.id,"unitPrice",v)} style={{color:"#ccc",textAlign:"right"}} placeholder="0.00" type="number" prefix="BDT "/></td>
                    <td style={{padding:"10px 20px",textAlign:"right"}}>
                      <InlineEdit value={manualMode?p.manualTotal:total>0?total.toFixed(2):""} onChange={v=>setP(p.id,"manualTotal",v)} style={{color:manualMode?"#ffaa00":"#fff",fontWeight:"bold",textAlign:"right"}} placeholder={`Auto: ${total.toFixed(2)}`} type="number" prefix="BDT "/>
                      {manualMode&&<button onClick={()=>setP(p.id,"manualTotal","")} style={{fontSize:10,color:"#555",background:"none",border:"none",cursor:"pointer",display:"block",marginLeft:"auto"}}>↺ auto</button>}
                    </td>
                    <td style={{padding:"4px 8px",textAlign:"center"}}>{edits.products.length>1&&<button onClick={()=>remP(p.id)} style={{background:"none",border:"none",color:"#550000",cursor:"pointer",fontSize:16}}>✕</button>}</td>
                  </tr>
                );
              })}
              <tr><td colSpan={5} style={{padding:"8px 20px"}}><button onClick={addP} style={{background:"none",border:"1px dashed #333",color:"#555",borderRadius:6,padding:"4px 14px",cursor:"pointer",fontSize:12,width:"100%"}}>+ Add Item</button></td></tr>
            </tbody>
            <tfoot>
              <tr style={{borderTop:"1px solid #222"}}>
                <td colSpan={2} style={{padding:"10px 20px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                    <span style={{color:"#666",fontSize:13}}>🚚 Delivery:</span>
                    <InlineEdit value={edits.deliveryCharge} onChange={v=>set("deliveryCharge",v)} style={{color:"#aaa",width:80}} placeholder="0.00" type="number"/>
                    <button onClick={()=>set("deliveryPaid",false)} style={{...bS(!edits.deliveryPaid?"#550000":"#1a1a1a",!edits.deliveryPaid?"#ff6666":"#555",11,!edits.deliveryPaid?"#880000":"#333"),padding:"3px 10px"}}>Unpaid</button>
                    <button onClick={()=>set("deliveryPaid",true)}  style={{...bS(edits.deliveryPaid?"#003300":"#1a1a1a",edits.deliveryPaid?"#44cc44":"#555",11,edits.deliveryPaid?"#005500":"#333"),padding:"3px 10px"}}>Paid</button>
                  </div>
                </td>
                <td style={{padding:"10px 16px",textAlign:"right",color:"#888",fontSize:13}}>{dc>0&&!edits.deliveryPaid?tk(dc):"—"}</td>
                <td colSpan={2}></td>
              </tr>
              <tr style={{background:"#1a1a1a"}}><td colSpan={3} style={{padding:"8px 20px",color:"#666",fontSize:13}}>Subtotal</td><td style={{padding:"8px 16px",textAlign:"right",color:"#aaa"}}>{tk(rev)}</td><td></td></tr>
              <tr style={{background:"#cc0000"}}><td colSpan={3} style={{padding:"12px 20px",color:"#fff",fontWeight:"bold",fontSize:15}}>Total</td><td style={{padding:"12px 16px",textAlign:"right",color:"#fff",fontWeight:"bold",fontSize:15}}>{tk(grandTotal)}</td><td></td></tr>
            </tfoot>
          </table>
          <div style={{padding:"16px 24px 0"}}>
            <div style={{fontSize:12,color:"#555",marginBottom:8,fontWeight:"bold",textTransform:"uppercase",letterSpacing:0.5}}>🖼 Order Images (for PDF)</div>
            <div onDragOver={e=>{e.preventDefault();}} onDrop={e=>{e.preventDefault();addImages(e.dataTransfer.files);}}
              style={{border:"2px dashed #333",borderRadius:8,padding:"12px",background:"#0d0d0d",marginBottom:10}}>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:orderImages.length>0?10:0}}>
                {orderImages.map(img=>(
                  <div key={img.id} style={{position:"relative",width:100,height:100}}>
                    <img src={img.src} alt={img.name} style={{width:100,height:100,objectFit:"cover",borderRadius:6,border:"1px solid #333"}}/>
                    <button onClick={()=>removeImage(img.id)} style={{position:"absolute",top:-6,right:-6,background:"#cc0000",border:"none",color:"#fff",borderRadius:"50%",width:20,height:20,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>✕</button>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <button onClick={()=>{const i=document.createElement("input");i.type="file";i.accept="image/*";i.multiple=true;i.onchange=e=>addImages(e.target.files);i.click();}}
                  style={bS("#1a1a1a","#aaa",12,"#333")}>+ Add Images</button>
                <span style={{color:"#444",fontSize:11}}>or drag & drop · {orderImages.length} image{orderImages.length!==1?"s":""} added</span>
              </div>
            </div>
          </div>
          <div style={{padding:"0 24px 24px"}}>
            <div style={{fontSize:12,color:"#555",marginBottom:4}}>Notes</div>
            <textarea value={edits.notes} onChange={e=>set("notes",e.target.value)} style={{...iS(),height:52,resize:"vertical",fontSize:13}} placeholder="Any notes for the client…"/>
          </div>
        </div>
      </div>
    </div>
  );
}

function InlineEdit({value,onChange,style={},placeholder="",type="text",prefix=""}){
  const[editing,setEditing]=useState(false);
  const[v,setV]=useState(value);
  useEffect(()=>{setV(value);},[value]);
  if(editing)return(
    <input autoFocus type={type} value={v} onChange={e=>setV(e.target.value)}
      onBlur={()=>{onChange(v);setEditing(false);}}
      onKeyDown={e=>{if(e.key==="Enter"){onChange(v);setEditing(false);}}}
      style={{background:"#1a1a1a",border:"1px solid #cc0000",borderRadius:4,padding:"2px 6px",color:"#fff",fontSize:style.fontSize||13,width:style.width||"auto",minWidth:60,outline:"none",textAlign:style.textAlign||"left"}}/>
  );
  return(
    <span onClick={()=>setEditing(true)} title="Click to edit" style={{cursor:"text",borderBottom:"1px dashed #333",display:style.display||"inline-block",...style}}>
      {prefix}{value||<span style={{color:"#444",fontStyle:"italic"}}>{placeholder}</span>}
    </span>
  );
}

function buildInvoiceHTML(e,rev,dc,grandTotal,logo,orderImages=[]){
  return`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Invoice ${e.invoiceNum}</title>

    *{box-sizing:border-box;margin:0;padding:0;}

    .logo-img{max-width:160px;max-height:90px;object-fit:contain;display:block;margin-bottom:8px;}
    .logo-box{width:52px;height:52px;background:#cc0000;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;color:#fff;margin-bottom:8px;}
    .company{font-size:16px;font-weight:bold;}.sub{font-size:11px;color:#888;}
    .bill-label{font-size:12px;color:#888;margin-top:10px;}.client-name{font-size:15px;font-weight:bold;}
    .client-info{font-size:13px;color:#666;margin-top:2px;}
    .inv-title{font-size:30px;font-weight:bold;letter-spacing:3px;text-align:right;}
    .inv-num{color:#cc0000;font-size:14px;text-align:right;margin-bottom:12px;}
    .detail-row{display:flex;justify-content:flex-end;gap:16px;font-size:13px;margin-bottom:4px;}
    .dl{color:#888;}.dv{color:#333;min-width:120px;text-align:right;}
    .balance{background:#cc0000;border-radius:6px;padding:8px 14px;display:flex;justify-content:space-between;gap:20px;margin-top:10px;}
    .balance span{color:#fff;font-weight:bold;font-size:13px;}
    table{width:100%;border-collapse:collapse;}
    th{background:#cc0000;color:#fff;padding:10px 16px;text-align:left;font-size:12px;letter-spacing:1px;}
    th.r{text-align:right;}td{padding:10px 16px;border-bottom:1px solid #eee;font-size:13px;color:#333;}td.r{text-align:right;}
    .item-name{color:#111;font-weight:bold;font-size:14px;}
    .sub-row td{background:#f9f9f9;color:#888;font-size:12px;}
    .del-row td{background:#fff;color:#888;font-size:12px;}
    .total-row td{background:#cc0000;color:#fff;font-weight:bold;font-size:15px;padding:12px 16px;}
    .notes{margin-top:20px;padding:12px 16px;background:#fff8f8;border-left:3px solid #cc0000;font-size:13px;color:#666;border-radius:4px;}
    .footer{margin-top:30px;text-align:center;font-size:11px;color:#bbb;border-top:1px solid #eee;padding-top:14px;}
    @media print{@page{margin:15mm;}body{padding:0;}.balance,.total-row td,th{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
  </style></head><body>
  <div class="top">
    <div>
      ${logo?`<img src="${logo}" class="logo-img" alt="Logo"/>`:`<div class="logo-box">PL</div>`}
      <div class="company">Poster Lagai</div><div class="sub">Print &amp; Design</div>
      <div class="bill-label">Bill To:</div>
      <div class="client-name">${e.clientName}</div>
      ${e.phone?`<div class="client-info">📞 ${e.phone}</div>`:""}
      ${e.address?`<div class="client-info">📍 ${e.address}</div>`:""}
    </div>
    <div>
      <div class="inv-title">INVOICE</div>
      <div class="inv-num"># ${e.invoiceNum}</div>
      <div class="detail-row"><span class="dl">Date:</span><span class="dv">${fmtDate(e.orderDate)}</span></div>
      <div class="detail-row"><span class="dl">Payment:</span><span class="dv">${e.paymentMethod}</span></div>
      <div class="balance"><span>Balance Due</span><span>${tk(grandTotal)}</span></div>
    </div>
  </div>
  <table>
    <thead><tr><th>Item</th><th class="r">Qty</th><th class="r">Rate</th><th class="r">Amount</th></tr></thead>
    <tbody>${e.products.map((p,i)=>`<tr style="background:${i%2===0?"#fff":"#fafafa"}"><td class="item-name">${p.name||"—"}</td><td class="r">${p.qty||"—"}</td><td class="r">${p.unitPrice?tk(parseFloat(p.unitPrice)):"—"}</td><td class="r">${tk(productTotal(p))}</td></tr>`).join("")}</tbody>
    <tfoot>
      ${dc>0?`<tr class="del-row"><td colspan="3">🚚 Delivery${e.deliveryPaid?" (Paid separately)":""}</td><td class="r">${e.deliveryPaid?"—":tk(dc)}</td></tr>`:""}

      ${orderImages.map(img=>`<div style="text-align:center;">

  </body></html>`;
}

// ── ORDER FORM ────────────────────────────────────────────────────────────────
function OrderForm({draft,setDraft,onSave,onCancel}){
  const set=(k,v)=>setDraft(d=>({...d,[k]:v}));
  const setP=(pid,f,v)=>setDraft(d=>({...d,products:d.products.map(p=>p.id===pid?{...p,[f]:v}:p)}));
  const addProd=()=>setDraft(d=>({...d,products:[...d.products,newProduct()]}));
  const remProd=(pid)=>setDraft(d=>({...d,products:d.products.filter(p=>p.id!==pid)}));
  const rev=orderRevenue(draft.products),dc=parseFloat(draft.deliveryCharge)||0;
  const grandTotal=draft.deliveryPaid?rev:rev+dc;
  return(
    <div>
      <h2 style={{margin:"0 0 14px",fontSize:17,color:"#fff"}}>{draft.history?.length>1?"✏️ Edit Order":"📦 New Order"}</h2>
      <Sec title="👤 Client">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          <Field label="Client Name *"><input style={iS()} value={draft.clientName} onChange={e=>set("clientName",e.target.value)} placeholder="Rahim Uddin"/></Field>
          <Field label="Phone"><input style={iS()} value={draft.phone} onChange={e=>set("phone",e.target.value)} placeholder="01XXXXXXXXX"/></Field>
          <Field label="Invoice #"><input style={iS()} value={draft.invoiceNum} onChange={e=>set("invoiceNum",e.target.value)} placeholder="PL26001"/></Field>
        </div>
        <div style={{marginTop:10}}>
          <Field label="Address"><input style={iS()} value={draft.address} onChange={e=>set("address",e.target.value)} placeholder="Delivery address"/></Field>
        </div>
      </Sec>
      <Sec title="📅 Dates & Status">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Field label="Order Date"><input type="date" style={iS()} value={draft.orderDate} onChange={e=>set("orderDate",e.target.value)}/></Field>
          <Field label="Delivery Date"><input type="date" style={iS()} value={draft.deliveryDate} onChange={e=>set("deliveryDate",e.target.value)}/></Field>
          <Field label="Print days before delivery">
            <input type="number" min={0} style={iS()} value={draft.printDaysBefore} onChange={e=>set("printDaysBefore",e.target.value)} placeholder="e.g. 3"/>
            {draft.deliveryDate&&draft.printDaysBefore!==""&&!isNaN(parseInt(draft.printDaysBefore))&&
              <div style={{fontSize:11,color:"#888",marginTop:2}}>→ Print on: <strong style={{color:"#cc0000"}}>{fmtDate(addDays(draft.deliveryDate,-parseInt(draft.printDaysBefore)))}</strong></div>}
          </Field>
          <Field label="Status">
            <select style={iS()} value={draft.status} onChange={e=>set("status",e.target.value)}>
              {STATUS_FLOW.map(s=><option key={s}>{s}</option>)}
            </select>
          </Field>
        </div>
      </Sec>
      <Sec title="💳 Payment">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,alignItems:"end"}}>
          <Field label="Method">
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {PAYMENT_METHODS.map(m=>(
                <button key={m} type="button" onClick={()=>set("paymentMethod",m)}
                  style={{...bS(draft.paymentMethod===m?"#cc0000":"#1a1a1a",draft.paymentMethod===m?"#fff":"#666",12,draft.paymentMethod===m?"#cc0000":"#333"),padding:"5px 12px",flex:1}}>{m}</button>
              ))}
            </div>
          </Field>
          <Field label="Delivery Charge (BDT)"><input type="number" min={0} step="0.01" style={iS()} value={draft.deliveryCharge} onChange={e=>set("deliveryCharge",e.target.value)} placeholder="0.00"/></Field>
          <Field label="Delivery Payment">
            <div style={{display:"flex",gap:6}}>
              <button type="button" onClick={()=>set("deliveryPaid",false)} style={{...bS(!draft.deliveryPaid?"#550000":"#1a1a1a",!draft.deliveryPaid?"#ff6666":"#555",12,!draft.deliveryPaid?"#880000":"#333"),flex:1,padding:"7px 0"}}>❌ Unpaid</button>
              <button type="button" onClick={()=>set("deliveryPaid",true)}  style={{...bS(draft.deliveryPaid?"#003300":"#1a1a1a",draft.deliveryPaid?"#44cc44":"#555",12,draft.deliveryPaid?"#005500":"#333"),flex:1,padding:"7px 0"}}>✅ Paid</button>
            </div>
          </Field>
        </div>
      </Sec>
      <Sec title="📦 Products" action={<button onClick={addProd} style={bS("#cc0000","#fff",12)}>+ Add</button>}>
        {draft.products.map((p,i)=>{
          const auto=(parseFloat(p.qty)||0)*(parseFloat(p.unitPrice)||0),manualMode=p.manualTotal!=="";
          return(
            <div key={p.id} style={{background:"#0d0d0d",border:"1px solid #1e1e1e",borderRadius:8,padding:10,marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontWeight:"bold",fontSize:12,color:"#666"}}>Item {i+1}</span>
                {draft.products.length>1&&<button onClick={()=>remProd(p.id)} style={{background:"none",border:"none",color:"#550000",cursor:"pointer",fontSize:18}}>✕</button>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",gap:8}}>
                <Field label="Name"><input style={iS()} value={p.name} onChange={e=>setP(p.id,"name",e.target.value)} placeholder="Product name"/></Field>
                <Field label="Qty"><input type="number" min={0} style={iS()} value={p.qty} onChange={e=>setP(p.id,"qty",e.target.value)} placeholder="0"/></Field>
                <Field label="Cost (BDT)"><input type="number" min={0} step="0.01" style={iS()} value={p.cost} onChange={e=>setP(p.id,"cost",e.target.value)} placeholder="0.00"/></Field>
                <Field label="Rate (BDT)"><input type="number" min={0} step="0.01" style={iS()} value={p.unitPrice} onChange={e=>setP(p.id,"unitPrice",e.target.value)} placeholder="0.00"/></Field>
                <Field label={<span style={{color:manualMode?"#ffaa00":"#666"}}>Amount {manualMode?"✎":"(auto)"}</span>}>
                  <input type="number" min={0} step="0.01" style={iS({background:manualMode?"#1a1500":"#111",borderColor:manualMode?"#664400":"#222"})}
                    value={manualMode?p.manualTotal:auto>0?auto.toFixed(2):""} placeholder={`${auto.toFixed(2)}`} onChange={e=>setP(p.id,"manualTotal",e.target.value)}/>
                  {manualMode&&<button onClick={()=>setP(p.id,"manualTotal","")} style={{fontSize:11,color:"#555",background:"none",border:"none",cursor:"pointer",padding:"2px 0"}}>↺ auto</button>}
                </Field>
              </div>
            </div>
          );
        })}
        {(()=>{const cost=orderCost(draft.products),profit=orderProfit(draft.products,draft.deliveryCharge,draft.deliveryPaid);return(
          <div style={{background:"#1a1a1a",borderRadius:8,padding:"10px 14px",display:"flex",gap:20,fontSize:14,flexWrap:"wrap",fontWeight:"bold"}}>
            <span style={{color:"#888"}}>Revenue: <span style={{color:"#fff"}}>{tk(rev)}</span></span>
            {cost>0&&<span style={{color:"#888"}}>Cost: <span style={{color:"#ff6666"}}>{tk(cost)}</span></span>}
            {cost>0&&<span style={{color:"#888"}}>Profit: <span style={{color:profit>=0?"#44cc44":"#cc4444"}}>{tk(profit)}</span></span>}
            {dc>0&&<span style={{color:"#888"}}>Delivery: <span style={{color:draft.deliveryPaid?"#44cc44":"#cc4444"}}>{tk(dc)}</span></span>}
            <span style={{color:"#888"}}>Grand Total: <span style={{color:"#cc0000"}}>{tk(grandTotal)}</span></span>
          </div>
        );})()}
      </Sec>
      <Field label="Notes"><textarea style={{...iS(),height:52,resize:"vertical"}} value={draft.notes} onChange={e=>set("notes",e.target.value)} placeholder="Client notes, special instructions…"/></Field>
      <div style={{display:"flex",gap:8,marginTop:16,justifyContent:"flex-end"}}>
        <button onClick={onCancel} style={bS("#1a1a1a","#888",13,"#333")}>Cancel</button>
        <button onClick={onSave} style={bS("#cc0000","#fff")}>💾 Save Order</button>
      </div>
    </div>
  );
}

// ── P&L ───────────────────────────────────────────────────────────────────────
function PnlView({data,from,to,onFromChange,onToChange,onPrintOrder}){
  const setPreset=(preset)=>{
    const t=todayStr(),[y,m]=t.split("-");
    if(preset==="thisMonth"){onFromChange(`${y}-${m}-01`);onToChange(t);}
    else if(preset==="lastMonth"){
      const d=new Date(t);d.setDate(1);d.setMonth(d.getMonth()-1);
      const ly=d.getFullYear(),lm=String(d.getMonth()+1).padStart(2,"0"),lastDay=new Date(ly,d.getMonth()+1,0).getDate();
      onFromChange(`${ly}-${lm}-01`);onToChange(`${ly}-${lm}-${lastDay}`);
    }else if(preset==="thisYear"){onFromChange(`${y}-01-01`);onToChange(t);}
    else if(preset==="allTime"){onFromChange("2000-01-01");onToChange("2099-12-31");}
  };
  return(
    <div>
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,padding:"14px 16px",marginBottom:18}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:10}}>
          <label style={{fontWeight:"bold",color:"#aaa",fontSize:13}}>From:</label>
          <input type="date" value={from} onChange={e=>onFromChange(e.target.value)} style={iS({width:160})}/>
          <label style={{fontWeight:"bold",color:"#aaa",fontSize:13}}>To:</label>
          <input type="date" value={to} onChange={e=>onToChange(e.target.value)} style={iS({width:160})}/>
          <span style={{color:"#444",fontSize:12}}>Delivered orders only</span>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[["thisMonth","This Month"],["lastMonth","Last Month"],["thisYear","This Year"],["allTime","All Time"]].map(([k,l])=>(
            <button key={k} onClick={()=>setPreset(k)} style={bS("#1a1a1a","#888",11,"#333")}>{l}</button>
          ))}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:22}}>
        <SCard label="Revenue"     value={tk(data.revenue)}   color="#4488ff"/>
        <SCard label="Total Cost"  value={tk(data.totalCost)} color="#ff6666"/>
        <SCard label="Profit"      value={tk(data.profit)}    color={data.profit>=0?"#44cc44":"#cc4444"}/>
        <SCard label="Delivery"    value={tk(data.delivery)}  color="#aaa"/>
        <SCard label="Grand Total" value={tk(data.total)}     color="#cc0000"/>
      </div>
      {data.orders.length===0
        ?<div style={{textAlign:"center",color:"#333",marginTop:40}}>No delivered orders for this period.</div>
        :data.orders.slice().sort((a,b)=>{
            const ai=parseInt((a.invoiceNum||"").replace(/\D/g,""))||0;
            const bi=parseInt((b.invoiceNum||"").replace(/\D/g,""))||0;
            return bi-ai;
          }).map(o=>{
          const rev=orderRevenue(o.products),dc=parseFloat(o.deliveryCharge)||0,grand=o.deliveryPaid?rev:rev+dc;
          const cost=orderCost(o.products),profit=orderProfit(o.products,o.deliveryCharge,o.deliveryPaid);
          return(
            <div key={o.id} style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,marginBottom:12,overflow:"hidden"}}>
              <div style={{background:"#1a1a1a",padding:"8px 14px",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6,alignItems:"center"}}>
                <span style={{fontWeight:"bold",color:"#fff"}}>#{o.seq} {o.clientName}</span>
                <div style={{display:"flex",gap:10,alignItems:"center",fontSize:12,flexWrap:"wrap"}}>
                  <span style={{color:"#666"}}>{o.paymentMethod}</span>
                  {cost>0&&<span style={{color:"#aaa"}}>Cost: {tk(cost)}</span>}
                  {cost>0&&<span style={{color:profit>=0?"#44cc44":"#cc4444"}}>Profit: {tk(profit)}</span>}
                  {dc>0&&<span style={{color:o.deliveryPaid?"#44cc44":"#cc4444"}}>🚚 {tk(dc)} {o.deliveryPaid?"Paid":"Unpaid"}</span>}
                  <span style={{color:"#cc0000",fontWeight:"bold"}}>Total: {tk(grand)}</span>
                  <button onClick={()=>onPrintOrder(o)} style={bS("#1a1a1a","#fff",11,"#333")}>🖨️ Invoice</button>
                </div>
              </div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr style={{background:"#0d0d0d"}}>{["Item","Qty","Rate","Amount"].map(h=><th key={h} style={{padding:"6px 12px",textAlign:h==="Item"?"left":"right",color:"#555"}}>{h}</th>)}</tr></thead>
                <tbody>{o.products.map((p,i)=>(
                  <tr key={p.id} style={{background:i%2===0?"#111":"#0d0d0d",borderBottom:"1px solid #1a1a1a"}}>
                    <td style={{padding:"6px 12px",color:"#fff",fontWeight:"bold"}}>{p.name||"—"}</td>
                    <td style={{padding:"6px 12px",color:"#666",textAlign:"right"}}>{p.qty||"—"}</td>
                    <td style={{padding:"6px 12px",color:"#666",textAlign:"right"}}>{p.unitPrice?tk(parseFloat(p.unitPrice)):"—"}</td>
                    <td style={{padding:"6px 12px",color:"#fff",textAlign:"right"}}>{tk(productTotal(p))}</td>
                  </tr>
                ))}</tbody>
                <tfoot>
                  {dc>0&&!o.deliveryPaid&&<tr style={{background:"#0d0d0d"}}><td colSpan={3} style={{padding:"6px 12px",color:"#555"}}>Delivery</td><td style={{padding:"6px 12px",color:"#888",textAlign:"right"}}>{tk(dc)}</td></tr>}
                  <tr style={{background:"#cc0000"}}><td colSpan={3} style={{padding:"7px 12px",color:"#fff",fontWeight:"bold"}}>Total</td><td style={{padding:"7px 12px",color:"#fff",fontWeight:"bold",textAlign:"right"}}>{tk(grand)}</td></tr>
                </tfoot>
              </table>
            </div>
          );
        })}
    </div>
  );
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function NavBtn({label,active,onClick}){return<button onClick={onClick} style={{background:active?"#cc0000":"transparent",color:active?"#fff":"#666",border:`1px solid ${active?"#cc0000":"#333"}`,borderRadius:6,padding:"5px 14px",cursor:"pointer",fontWeight:"bold",fontSize:13}}>{label}</button>;}
function Info({label,value}){return<div><span style={{color:"#555",fontSize:11}}>{label}: </span><span style={{fontWeight:"bold",color:"#ccc"}}>{value}</span></div>;}
function Row({label,value}){return<div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:12,marginBottom:4,fontSize:13}}><span style={{color:"#666"}}>{label}</span>{value}</div>;}
function Field({label,children}){return<div style={{display:"flex",flexDirection:"column",gap:3}}><label style={{fontSize:11,fontWeight:"bold",color:"#555",textTransform:"uppercase",letterSpacing:0.5}}>{label}</label>{children}</div>;}
function Sec({title,children,action}){return<div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:8,padding:12,marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{fontWeight:"bold",fontSize:13,color:"#888"}}>{title}</div>{action}</div>{children}</div>;}
function SCard({label,value,color}){return<div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,padding:"14px",textAlign:"center"}}><div style={{fontSize:11,color:"#444",marginBottom:5,textTransform:"uppercase",letterSpacing:1}}>{label}</div><div style={{fontSize:20,fontWeight:"bold",color}}>{value}</div></div>;}
function Modal({children,onClose}){return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}}><div style={{background:"#111",border:"1px solid #222",borderRadius:14,padding:22,maxWidth:700,width:"100%",maxHeight:"93vh",overflowY:"auto"}}>{children}</div></div>;}
function iS(extra={}){return{border:"1px solid #222",borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",background:"#0d0d0d",color:"#eee",width:"100%",boxSizing:"border-box",...extra};}
function bS(bg,color,fontSize=13,border){return{background:bg,color,border:`1px solid ${border||bg}`,borderRadius:6,padding:"7px 14px",cursor:"pointer",fontWeight:"bold",fontSize};}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
